# Option B (future full machine): one service, one process - the API.
# (Reminders fire on the device.) The DB lives in a named volume and survives
# rebuilds.
#   docker compose up -d --build
# Scaling further (Postgres): docker-compose.split.yml
services:
  tutor:
    build: ./backend
    env_file: backend/.env
    environment:
      - DATABASE_URL=sqlite:////data/tutor.db
    volumes:
      - tutor-data:/data
    ports:
      - "8000:8000"          # reach it at http://VPS_IP:8000
    restart: unless-stopped

volumes:
  tutor-data:
