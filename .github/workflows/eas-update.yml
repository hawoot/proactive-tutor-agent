# Publishes an over-the-air update to the installed app on every push to main
# that touches mobile/. The app picks it up on next launch - no rebuild, no
# reinstall. Needs the EXPO_TOKEN repo secret (expo.dev access token).
name: EAS Update
on:
  push:
    branches: [main]
    paths: ['mobile/**']
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm install
        working-directory: mobile
      - run: eas update --branch preview --auto --non-interactive
        working-directory: mobile
